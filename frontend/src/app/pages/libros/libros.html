<div class="libros-container">
  <h1>Libros</h1>

  @if (cargando()) {
  <p>Cargando...</p>
  } @else {
  <table>
    <thead>
    <tr>
      <th>Título</th>
      <th>Autor</th>
      <th>ISBN</th>
      <th>Año</th>
      <th>Stock</th>
    </tr>
    </thead>
    <tbody>
    @for (libro of libros(); track libro.id) {
    <tr>
      <td>{{ libro.titulo }}</td>
      <td>{{ libro.autor }}</td>
      <td>{{ libro.isbn }}</td>
      <td>{{ libro.anioPublicacion }}</td>
      <td>{{ libro.stock }}</td>
    </tr>
    }
    </tbody>
  </table>

  <div class="paginacion">
    <button (click)="paginaAnterior()" [disabled]="paginaActual() === 0">Anterior</button>
    <span>Página {{ paginaActual() + 1 }} de {{ totalPaginas() }}</span>
    <button (click)="siguientePagina()" [disabled]="paginaActual() + 1 >= totalPaginas()">Siguiente</button>
  </div>
  }
</div>
